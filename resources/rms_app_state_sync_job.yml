resources:
  jobs:
    rms_app_state_sync_job:
      name: "[${bundle.target}] RMS App State Sync (Lakebase → UC)"

      tasks:
        - task_key: sync_to_uc
          notebook_task:
            notebook_path: ../src/pipelines/rms_app_state_sync/sync_to_uc.py
            base_parameters:
              uc_catalog: ${var.forecast_catalog}
              uc_schema: ${var.forecast_schema}
              lakebase_instance_name: ${var.lakebase_instance_name}
            source: WORKSPACE
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            num_workers: 0
            node_type_id: "Standard_D4ds_v5"
            data_security_mode: SINGLE_USER
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: "local[*]"
            custom_tags:
              ResourceClass: SingleNode

      schedule:
        quartz_cron_expression: "0 */15 * * * ?"
        timezone_id: "UTC"
        pause_status: PAUSED
